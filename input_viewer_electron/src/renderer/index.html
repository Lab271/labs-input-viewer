<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src blob: mediastream:; img-src 'self' data: blob:">
  <title>Input Viewer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Left Border -->
  <div id="left-border" class="edge-border"></div>
  
  <!-- Video Container -->
  <div id="video-wrapper">
    <div id="left-feed" class="video-feed">
      <video id="left-video" autoplay playsinline muted></video>
      <div class="no-signal-overlay hidden">
        <div class="no-signal-icon">📺</div>
        <div class="no-signal-text">No Signal</div>
      </div>
    </div>
    
    <!-- Center Logo Divider (shown in dual view) -->
    <div id="center-divider">
      <img src="./logo.png" alt="Input Viewer" class="divider-logo">
    </div>
    
    <div id="right-feed" class="video-feed">
      <video id="right-video" autoplay playsinline muted></video>
      <div class="no-signal-overlay hidden">
        <div class="no-signal-icon">📺</div>
        <div class="no-signal-text">No Signal</div>
      </div>
    </div>
  </div>
  
  <!-- Right Border -->
  <div id="right-border" class="edge-border"></div>

  <!-- Center Logo (shown when no inputs) -->
  <div id="center-logo" class="hidden">
    <div class="logo-text">Input Viewer</div>
    <div class="logo-subtext">Connect a video input device to begin</div>
  </div>

  <!-- Freeze Frame Overlay -->
  <div id="freeze-overlay" class="hidden">
    <canvas id="freeze-canvas"></canvas>
  </div>
  
  <!-- Freeze Indicator -->
  <div id="freeze-indicator" class="hidden">
    <span class="freeze-icon">❙❙</span> FROZEN
  </div>

  <!-- Input Name Overlay -->
  <div id="input-name-overlay" class="hidden">
    <span id="input-name-text"></span>
  </div>

  <!-- Dropdown Panel Trigger -->
  <div id="dropdown-trigger">
    <span class="dropdown-arrow">▼</span>
  </div>

  <!-- Combined Dropdown Panel -->
  <div id="dropdown-panel">
    <div class="dropdown-content">
      <div class="dropdown-section">
        <h4>Inputs</h4>
        <div id="input-list"></div>
      </div>
      
      <div class="dropdown-section">
        <h4>Layout</h4>
        <div class="setting-row">
          <label>View Mode</label>
          <div class="layout-buttons">
            <button id="layout-dual" class="layout-btn active" title="Double View">D</button>
            <button id="layout-single" class="layout-btn" title="Single View">S</button>
          </div>
        </div>
        <div class="setting-row">
          <label>Center Gap</label>
          <input type="range" id="center-gap" min="20" max="200" value="60">
          <span id="center-gap-value">60px</span>
        </div>
        <div class="setting-row">
          <label>Borders</label>
          <input type="range" id="border-width" min="0" max="200" value="0">
          <span id="border-width-value">0px</span>
        </div>
      </div>
      
      <div class="dropdown-section">
        <h4>Shortcuts</h4>
        <table>
          <tr><td><kbd>1</kbd>-<kbd>4</kbd></td><td>Select input</td></tr>
          <tr><td><kbd>Space</kbd></td><td>Freeze frame</td></tr>
          <tr><td><kbd>F</kbd></td><td>Fullscreen</td></tr>
          <tr><td><kbd>Esc</kbd></td><td>Exit/unfreeze</td></tr>
          <tr><td><kbd>Q</kbd></td><td>Quit</td></tr>
        </table>
      </div>
      
      <div class="dropdown-footer">
        <span>Input Viewer v2.0.0</span>
        <span>© Labs for Space</span>
      </div>
    </div>
  </div>

  <!-- Update Notification -->
  <div id="update-notification" class="hidden">
    <span id="update-message"></span>
  </div>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
