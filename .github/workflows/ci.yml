name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: input_viewer_electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: input_viewer_electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check code style
        run: npm run lint --if-present

      - name: Build app
        run: npm run build

  build-mac:
    name: Build macOS
    needs: lint-and-build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: input_viewer_electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: input_viewer_electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package for macOS
        run: npm run build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-windows:
    name: Build Windows
    needs: lint-and-build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: input_viewer_electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: input_viewer_electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package for Windows
        run: npm run build && npx electron-builder --win --publish never

  # Auto-merge when all checks pass
  auto-merge:
    name: Auto Merge
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge PR
        uses: pascalgn/automerge-action@v0.16.4
        env:
          # Use PAT instead of GITHUB_TOKEN to trigger release workflow after merge
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: ""
          MERGE_DELETE_BRANCH: true
