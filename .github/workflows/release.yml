name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: input_viewer_electron

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: input_viewer_electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build and package for macOS
        run: npm run build:mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Fix latest-mac.yml URLs
        run: |
          if [ -f dist/latest-mac.yml ]; then
            sed -i '' 's|LAB271/input-viewer/releases|LAB271/input-viewer-releases/releases|g' dist/latest-mac.yml
            cat dist/latest-mac.yml
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-files
          path: |
            input_viewer_electron/dist/*.dmg
            input_viewer_electron/dist/*.zip
            input_viewer_electron/dist/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: input_viewer_electron

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: input_viewer_electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build and package for Windows
        run: npm run build:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix latest.yml URLs
        run: |
          if (Test-Path dist/latest.yml) {
            (Get-Content dist/latest.yml) -replace 'LAB271/input-viewer/releases', 'LAB271/input-viewer-releases/releases' | Set-Content dist/latest.yml
            Get-Content dist/latest.yml
          }
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-files
          path: |
            input_viewer_electron/dist/*.exe
            input_viewer_electron/dist/latest.yml

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-files
          path: ./artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-files
          path: ./artifacts/win

      - name: List files
        run: find ./artifacts -type f

      - name: Create Release in source repo
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/mac/*.dmg
            ./artifacts/mac/*.zip
            ./artifacts/win/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release in public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: LAB271/input-viewer-releases
          tag_name: ${{ github.ref_name }}
          name: Input Viewer ${{ github.ref_name }}
          files: |
            ./artifacts/mac/*.dmg
            ./artifacts/mac/*.zip
            ./artifacts/mac/*.yml
            ./artifacts/win/*.exe
            ./artifacts/win/*.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
