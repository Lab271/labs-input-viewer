name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: hdmi-viewer-macos
          - os: windows-latest
            asset_name: hdmi-viewer-windows
          - os: ubuntu-latest
            asset_name: hdmi-viewer-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 opencv-python numpy Pillow pyinstaller

      - name: Build executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            pyinstaller --onefile --windowed --name ${{ matrix.asset_name }} --icon=assets/icon.icns HDMI-viewer.py
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pyinstaller --onefile --windowed --name ${{ matrix.asset_name }} --icon=assets/icon.ico HDMI-viewer.py
          else
            pyinstaller --onefile --name ${{ matrix.asset_name }} HDMI-viewer.py
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: HDMI Viewer v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
