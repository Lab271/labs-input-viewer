name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset_name: input-viewer-macos
          - os: windows-latest
            asset_name: input-viewer-windows
          - os: ubuntu-latest
            asset_name: input-viewer-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 opencv-python-headless numpy Pillow pyinstaller

      - name: Build executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            pyinstaller input-viewer.spec
            cd dist && zip -r ../input-viewer-macos.zip "Input Viewer.app"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            pyinstaller input-viewer.spec
            mv "dist/Input Viewer.exe" dist/input-viewer-windows.exe
          else
            pyinstaller input-viewer.spec
            cd dist && tar -czvf ../input-viewer-linux.tar.gz "Input Viewer"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            input-viewer-*.zip
            input-viewer-*.tar.gz
            dist/input-viewer-*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Input Viewer v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
